apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-dev-rollouts
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  labels:
    codefresh.io/entity: component
    codefresh.io/internal: "false"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: argo-rollouts
    # repoURL: https://codefresh-io.github.io/argo-helm
    # targetRevision: 2.37.3-6-v1.7.2-cap-CR-29629
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 2.40.6
    helm:
      releaseName: argo-rollouts
  destination:
    namespace: default
    server: https://demo-dev-vcluster.rnd-sandbox.cf-infra.com
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
